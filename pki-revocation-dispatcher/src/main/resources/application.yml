spring:
  application:
    name: pki-revocation-dispatcher
  datasource:
    url: jdbc:postgresql://localhost:5432/pki_platform
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    schemas: pki_revocation
    default-schema: pki_revocation
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 18084

logging:
  level:
    root: INFO
    com.pki.platform: INFO

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.pki.platform.revocation.model
  configuration:
    map-underscore-to-camel-case: true
